# SwiftLint Configuration for Runvox
# Reference: https://github.com/realm/SwiftLint

# 対象
included:
  - Runvox
  - RunvoxTests

# 除外
excluded:
  - Runvox.xcodeproj
  - DerivedData
  - .build

# 無効化するルール
disabled_rules:
  - todo                    # // TODO: は許可
  - identifier_name         # SwiftUI で短い名前を許容（id, x, y 等）
  - trailing_comma          # SwiftUI の宣言的記法で trailing comma が見栄え良い

# 追加で有効化するルール
opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_count
  - empty_string
  - empty_xctest_method
  - explicit_init
  - fatal_error_message
  - first_where
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - private_outlet
  - prohibited_super_call
  - sorted_first_last
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

# 個別ルールの閾値
line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: false

file_length:
  warning: 500
  error: 1000
  ignore_comment_only_lines: true

function_body_length:
  warning: 60
  error: 100

function_parameter_count:
  warning: 6
  error: 8

type_body_length:
  warning: 300
  error: 500

cyclomatic_complexity:
  warning: 12
  error: 20

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 4

# レポーター
reporter: "xcode"
