name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# 同じブランチで連続実行されたら古い方をキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # ビルド & テスト
  # ============================================================
  test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install tools
        run: |
          brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick an available iPhone simulator
        id: simulator
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | jq -r '[.devices | to_entries[] | select(.key | test("iOS")) | .value[] | select(.name | startswith("iPhone")) | .udid] | first')
          if [ -z "$UDID" ] || [ "$UDID" = "null" ]; then
            echo "::error::No iPhone simulator available"
            xcrun simctl list devices available
            exit 1
          fi
          NAME=$(xcrun simctl list devices -j | jq -r --arg udid "$UDID" '.devices | to_entries[] | .value[] | select(.udid == $udid) | .name')
          echo "udid=$UDID" >> $GITHUB_OUTPUT
          echo "::notice::Using simulator: $NAME ($UDID)"

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project Runvox.xcodeproj \
            -scheme Runvox \
            -destination "id=${{ steps.simulator.outputs.udid }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Runvox.xcodeproj \
            -scheme Runvox \
            -destination "id=${{ steps.simulator.outputs.udid }}" \
            -configuration Debug \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            -parallel-testing-enabled YES \
            | xcbeautify --renderer github-actions

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: TestResults.xcresult
          retention-days: 7

  # ============================================================
  # SwiftLint（コード品質チェック）
  # ============================================================
  lint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging
